name: CI

on:
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  pre-commit-checks:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: 0.11.27

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Run pre-commit
        run: |
          uv tool run pre-commit run --show-diff-on-failure --color=always --all-files

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: pre-commit-checks
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: 0.11.27

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run coverage run --branch -m pytest tests/unit -vv

      - name: Validate test coverage
        if: always()
        run: uv run coverage report --fail-under=32
